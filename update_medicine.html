<!DOCTYPE html>
<html>
<head>
    <title>Update Medicine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Update Medicine</h1>

    <div class="form-box">

        <form method="POST">

            <label>Medicine Name</label>
            <input type="text" name="name" value="{{ medicine[1] }}" required>

            <label>Quantity</label>
            <input type="number" name="quantity" value="{{ medicine[2] }}" required>

            <label>Expiry Date</label>
            <input type="date" name="expiry" value="{{ medicine[3] }}" required>

            <label>Manufacturer</label>
            <input type="text" name="company" value="{{ medicine[4] }}" required>

            <button type="submit">Update Medicine</button>

        </form>

        <br>

        <a href="/view" class="home-btn">Back to Medicine List</a>

    </div>

</div>

</body>
</html>
